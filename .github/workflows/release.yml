name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Format check
        run: black --check .

      - name: Lint
        run: flake8 .

      - name: Type check
        run: mypy .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## CIS Azure Foundations Benchmark Audit Tool ${{ github.ref_name }}

            **Benchmark:** CIS Microsoft Azure Foundations Benchmark v5.0.0
            **Coverage:** See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for current control coverage

            ### Requirements
            - Python 3.10+
            - Azure CLI (`az login` before running)

            ### Quick Start
            ```powershell
            az login
            python cis_azure_audit.py
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
